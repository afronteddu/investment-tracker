# Investment Tracker — Portfolio Config
# Fill in your actual positions. ticker must be the Yahoo Finance symbol.
# For EU ETFs on Euronext/Xetra, append .AS (Amsterdam) or .DE (Frankfurt)
# e.g. VWRL.AS, CNDX.AS

settings:
  refresh_seconds: 60          # how often the dashboard refreshes
  alert_threshold_pct: 5       # alert when any holding moves >X% in a session
  scanner_gainers_pct: 8       # scanner flags tickers up >X% in a session
  scanner_losers_pct: -8       # scanner flags tickers down >X% in a session
  currency: EUR                # display currency (informational only)

# --- YOUR POSITIONS ---
# cost_basis: average price you paid per share (EUR or USD, match the ticker)
# shares: number of shares held
# target_price: your exit / take-profit level
# stop_loss: optional — alert if price drops below this
# bucket: retirement | growth | high_conviction | house_savings
# notes: free text

positions:
  - ticker: NBIS       # Neurobiological Sciences (US)
    shares: 0          # fill in
    cost_basis: 0      # fill in
    target_price: 0    # fill in — your 6-12mo target
    stop_loss: 0       # fill in
    bucket: high_conviction
    notes: "30% of 6-12mo bet. Deploying remaining tranches May 19 + May 26."

  - ticker: VRT        # Vertiv Holdings
    shares: 0
    cost_basis: 0
    target_price: 0
    stop_loss: 0
    bucket: high_conviction
    notes: "Part of AI infrastructure 6-12mo bet."

  - ticker: APLD       # Applied Digital
    shares: 0
    cost_basis: 0
    target_price: 0
    stop_loss: 0
    bucket: high_conviction
    notes: "Part of AI infrastructure 6-12mo bet."

